jira:
  project_key: "KPI"
  story_points_field: "customfield_10106"
  sprint_field: "customfield_10101"
  # Age (days) beyond which unknown statuses are treated as done
  unknown_status_done_after_days: 21
  # Issue type names (auto-discovered from Jira API, fallback values below)
  story_types: ["Story", "User Story", "Récit"]
  task_types: ["Task", "Sub-task", "Subtask", "Sous-tâche", "Tâche"]
  notify_users: true
  legacy_label_prefixes:
    - "fonctionnalites:"
    - "design:"
    - "technique:"
  status_mapping:
    backlog: ["Nouveau", "Ouvert", "Open", "New"]
    specification: ["Rédigée", "Affinage", "A affiner"]
    todo: ["Prêt", "À faire", "A faire", "To Do", "Prêt pour Dev"]
    in-progress: ["En cours", "In Progress", "En développement"]
    review: ["Revue de code", "Code Review", "En revue"]
    testing: ["Recette", "En recette", "En test", "Test", "A valider"]
    blocked: ["Bloqué", "Bloque", "Blocked", "En attente"]
    abandoned: ["Abandonné", "Cancelled", "Annulé"]
    done: ["Terminé", "Fermé", "Done", "Closed", "Résolu", "Resolved"]
    delivered: ["Livré", "Deployed", "En production"]

confluence:
  space_key: "KPI"
  parent_page_title: "06_Organisation / Planification"

project:
  name: "KPI"
  start_date: "2025-10-01"
  end_date: "2026-09-30"
  sprint_duration_weeks: 3
  # Optional: override sprint list instead of computing from start/end
  # sprints:
  #   - {number: 1, start: "2025-10-01", end: "2025-10-21"}

velocity_unit: "week"

# Points par défaut pour les stories non estimées (0 SP), non faites, non planifiées
unestimated_default_points: 3
# Cap du padding non estimé en ratio du total connu (0.5 = max 50%)
unestimated_max_ratio: 0.5
# Marge d'erreur sur le projeté reste à faire (+15%)
projection_margin: 0.15
# Poids par défaut pour les US projetées futures (0.0-1.0)
projection_default_weight: 0.3

archive:
  db_path: "data/kpi.json"

domain_weight:
  fonctionnel: 0.35
  conception: 0.08
  developpement: 0.25
  ops: 0.05
  devops: 0.03
  qualite: 0.08
  performance: 0.02
  observabilite: 0.02
  securite: 0.04
  pilotage: 0.03
  documentation: 0.03
  habilitations: 0.02

# ═══════════════════════════════════════════════════════
# DIMENSIONS — 3 top-levels: fonctionnel / technique / organisationnel
# label = single lowercase word (dashes ok), used as Jira label
# ═══════════════════════════════════════════════════════
dimensions:
  - label: fonctionnel
    display: "Fonctionnel"
    children:
      - label: referentiels
        display: "Référentiels"
        keywords: ["référentiel", "données de référence", "données froides", "paramétrage"]
        children:
          - label: structures
            display: "Structures"
            keywords: ["référentiel des structures", "paramétrage structures", "structure organisationnelle"]
          - label: metiers
            display: "Métiers"
            keywords: ["référentiel des métiers", "référentiel métier", "nomenclature métier"]
          - label: fonctions
            display: "Fonctions"
            keywords: ["référentiel des fonctions", "catalogue fonctions"]
      - label: campagnes
        display: "Campagnes"
        keywords: ["campagne"]
        children:
          - label: initialisation
            display: "Initialisation"
            keywords: ["initialisation campagne", "créer une campagne", "ouvrir campagne"]
          - label: gestion
            display: "Gestion"
            keywords: ["gérer campagne", "gestion campagne", "clôture campagne"]
      - label: enquetes
        display: "Enquêtes"
        keywords: ["enquête", "enquete"]
        children:
          - label: saisie
            display: "Saisie"
            keywords: ["saisir une enquête", "saisie enquête", "formulaire enquête"]
          - label: ventilation
            display: "Ventilation ETP"
            keywords: ["ventilation", "ventilation ETP", "répartition ETP", "ETP", "effectif"]
          - label: validation-enquete
            display: "Validation"
            keywords: ["valider une enquête", "validation enquête", "circuit validation", "visa"]
          - label: consultation
            display: "Consultation / Export"
            keywords: ["consultation", "consulter enquête", "export enquête", "export", "édition"]
      - label: annuaire
        display: "Annuaire (ETAA-PADI)"
        keywords: ["annuaire", "ETAA", "PADI", "contrat de service", "liste agents"]
      - label: ecran-accueil
        display: "Écran d'accueil"
        keywords: ["écran d'accueil", "page d'accueil", "accueil", "navigation"]
      - label: documentation-novae
        display: "Documentation NOVAE"
        keywords: ["documentation NOVAE", "NOVAE"]
      - label: conception-fonctionnelle
